services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ainovel}
      POSTGRES_USER: ${POSTGRES_USER:-ainovel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ainovel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WAIT_FOR_DB: "1"
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://ainovel:ainovel@postgres:5432/ainovel}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}

      TASK_QUEUE_BACKEND: rq
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-default}

      VECTOR_CHROMA_PERSIST_DIR: /data/chroma

      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}

      # Auth (multi-user): disable dev fallback by default.
      AUTH_DEV_FALLBACK_USER_ID: ${AUTH_DEV_FALLBACK_USER_ID:-}
      AUTH_ADMIN_USER_ID: ${AUTH_ADMIN_USER_ID:-admin}
      AUTH_ADMIN_PASSWORD: "${AUTH_ADMIN_PASSWORD:-ChangeMe123!}"
      AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL:-}
      AUTH_ADMIN_DISPLAY_NAME: ${AUTH_ADMIN_DISPLAY_NAME:-管理员}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}

      # Secrets: can be left empty; container entrypoint will auto-generate and persist to /data/secrets.
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-}
      AUTH_SESSION_SIGNING_KEY: ${AUTH_SESSION_SIGNING_KEY:-}

      # LinuxDo OIDC (optional)
      LINUXDO_OIDC_CLIENT_ID: ${LINUXDO_OIDC_CLIENT_ID:-}
      LINUXDO_OIDC_CLIENT_SECRET: ${LINUXDO_OIDC_CLIENT_SECRET:-}
      LINUXDO_OIDC_REDIRECT_URI: ${LINUXDO_OIDC_REDIRECT_URI:-}
      LINUXDO_OIDC_SCOPES: ${LINUXDO_OIDC_SCOPES:-openid profile email}

      # Runtime outbound proxy (optional): used by OIDC discovery/token/userinfo and other httpx clients that trust env.
      HTTP_PROXY: ${OUTBOUND_PROXY_URL:-}
      HTTPS_PROXY: ${OUTBOUND_PROXY_URL:-}
      http_proxy: ${OUTBOUND_PROXY_URL:-}
      https_proxy: ${OUTBOUND_PROXY_URL:-}
      NO_PROXY: ${OUTBOUND_NO_PROXY:-localhost,127.0.0.1,::1,backend,frontend,postgres,redis,rq_worker}
      no_proxy: ${OUTBOUND_NO_PROXY:-localhost,127.0.0.1,::1,backend,frontend,postgres,redis,rq_worker}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - app_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  rq_worker:
    build:
      context: ./backend
    command: ["python", "scripts/run_rq_worker.py"]
    environment:
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WAIT_FOR_DB: "1"
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://ainovel:ainovel@postgres:5432/ainovel}

      TASK_QUEUE_BACKEND: rq
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-default}
      RQ_WORKER_PROCESSES: ${RQ_WORKER_PROCESSES:-1}

      VECTOR_CHROMA_PERSIST_DIR: /data/chroma

      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}

      AUTH_DEV_FALLBACK_USER_ID: ${AUTH_DEV_FALLBACK_USER_ID:-}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-}
      AUTH_SESSION_SIGNING_KEY: ${AUTH_SESSION_SIGNING_KEY:-}

      LINUXDO_OIDC_CLIENT_ID: ${LINUXDO_OIDC_CLIENT_ID:-}
      LINUXDO_OIDC_CLIENT_SECRET: ${LINUXDO_OIDC_CLIENT_SECRET:-}
      LINUXDO_OIDC_REDIRECT_URI: ${LINUXDO_OIDC_REDIRECT_URI:-}
      LINUXDO_OIDC_SCOPES: ${LINUXDO_OIDC_SCOPES:-openid profile email}

      HTTP_PROXY: ${OUTBOUND_PROXY_URL:-}
      HTTPS_PROXY: ${OUTBOUND_PROXY_URL:-}
      http_proxy: ${OUTBOUND_PROXY_URL:-}
      https_proxy: ${OUTBOUND_PROXY_URL:-}
      NO_PROXY: ${OUTBOUND_NO_PROXY:-localhost,127.0.0.1,::1,backend,frontend,postgres,redis,rq_worker}
      no_proxy: ${OUTBOUND_NO_PROXY:-localhost,127.0.0.1,::1,backend,frontend,postgres,redis,rq_worker}
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped

volumes:
  postgres_data:
  app_data:
